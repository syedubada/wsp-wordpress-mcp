# Regenerates abilities.md / abilities.json from the plugin registry and opens a
# PR on the website repo (freewordpressmcp.com) whenever the tool list changes.
#
# This workflow runs on GitHub's servers only. Nothing here ships in the plugin
# zip, and it never modifies files inside wsp-mcp-ai-agents-connector/.
#
# One-time setup:
#   Create a fine-grained Personal Access Token with "Contents: Read and write"
#   and "Pull requests: Read and write" scoped to the bilalnaseer/freewordpressmcp.com
#   repo, then add it to THIS repo as an Actions secret named WEBSITE_REPO_TOKEN.
name: Sync abilities to website

on:
  push:
    branches: [main]
    paths:
      - 'wsp-mcp-ai-agents-connector/includes/registry.php'
      - 'bin/generate-abilities-md.php'
      - '.github/workflows/sync-abilities.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout plugin repo
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Regenerate abilities files
        run: |
          php bin/generate-abilities-md.php > abilities.md
          php bin/generate-abilities-md.php --json > abilities.json

      - name: Commit regenerated files back to this repo
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: regenerate abilities from registry [skip ci]'
          file_pattern: 'abilities.md abilities.json'

      - name: Checkout website repo
        uses: actions/checkout@v4
        with:
          repository: bilalnaseer/freewordpressmcp.com
          token: ${{ secrets.WEBSITE_REPO_TOKEN }}
          path: website

      - name: Copy generated files into website repo
        run: |
          cp abilities.md website/abilities.md
          cp abilities.json website/abilities.json

      - name: Open PR on website repo
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.WEBSITE_REPO_TOKEN }}
          path: website
          commit-message: 'chore: sync abilities from plugin registry'
          branch: sync/abilities-from-plugin
          delete-branch: true
          title: 'Sync abilities from plugin registry'
          body: |
            Automated update of `abilities.md` / `abilities.json`, generated from the
            plugin's `includes/registry.php`.

            **Before merging**, update to match:
            - the `ABILITIES` array in `abilities-directory.html`
            - the `lastmod` date for that page in `sitemap.xml`
